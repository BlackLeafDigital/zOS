# =============================================================================
# Monitor Configuration
# Edit this file or use wdisplays (SUPER+SHIFT+D) to configure displays
# Run `hyprctl monitors` to list connected outputs
# =============================================================================

# Default: auto-detect and extend all monitors side-by-side
monitor=,preferred,auto,auto

# Manual example: monitor=DP-1,2560x1440@144,0x0,1
# Mirror example: monitor=HDMI-A-1,preferred,auto,1,mirror,DP-1
