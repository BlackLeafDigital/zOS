# =============================================================================
# zOS Hyprland Configuration
# System defaults update automatically with OS upgrades.
# Add your customizations to the user override files below.
# =============================================================================

# System defaults (managed by zOS — do not edit these)
source = /usr/share/zos/hypr/defaults.conf
source = /usr/share/zos/hypr/keybinds.conf
source = /usr/share/zos/hypr/windowrules.conf
source = /usr/share/zos/hypr/autostart.conf
source = /usr/share/zos/hypr/nvidia.conf

# User overrides (edit these — they persist across OS updates)
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/user-settings.conf
source = ~/.config/hypr/user-keybinds.conf
source = ~/.config/hypr/user-windowrules.conf
