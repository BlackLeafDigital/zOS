# =============================================================================
# zOS Hyprland Configuration
# =============================================================================

# --- Monitor setup (see monitors.conf) ---
source = ~/.config/hypr/monitors.conf

# --- Autostart ---
exec-once = waybar
exec-once = swaync
exec-once = hyprpaper
exec-once = hypridle
exec-once = hyprpolkitagent
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = notify-send -t 15000 "zOS Keybindings" "SUPER+Return       Terminal\nSUPER+D            App Launcher\nSUPER+E            File Manager\nSUPER+Q            Close Window\nSUPER+H/J/K/L     Navigate\nSUPER+1-9          Workspaces\nSUPER+F            Fullscreen\nSUPER+V            Float\nSUPER+N            Notifications\nSUPER+SHIFT+V      Clipboard History\nSUPER+SHIFT+E      Power Menu\nSUPER+SHIFT+D      Display Settings\nSUPER+SHIFT+A      Audio Routing\nSUPER+SHIFT+C      Color Picker\nSUPER+F1           Show This Again"
exec-once = notify-send -t 12000 "zOS is Immutable" "dnf is disabled at runtime.\n\nInstall software with:\n  flatpak  (GUI apps)\n  brew     (CLI tools)\n  distrobox (full Linux envs)\n\nRun sudo zos-setup for GRUB/dual-boot config"

# --- Environment ---
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,catppuccin-mocha-dark-cursors
env = QT_QPA_PLATFORMTHEME,qt5ct

# --- Input ---
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# --- General ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(89b4faee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(313244aa)
    layout = dwindle
    allow_tearing = false
}

# --- Decoration ---
decoration {
    rounding = 8
    blur {
        enabled = true
        size = 6
        passes = 2
    }
    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(1a1a2eee)
    }
}

# --- Animations ---
animations {
    enabled = true
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 5, smoothIn
    animation = workspaces, 1, 6, default
}

# --- Layout ---
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# --- Layer rules (fix waybar blur artifacts) ---
layerrule = blur, waybar
layerrule = ignorealpha 0.5, waybar

# =============================================================================
# Keybindings
# =============================================================================
$mainMod = SUPER

# --- Core ---
bind = $mainMod, F1, exec, notify-send -t 10000 "zOS Keybindings" "SUPER+Return       Terminal\nSUPER+D            App Launcher\nSUPER+E            File Manager\nSUPER+Q            Close Window\nSUPER+H/J/K/L     Navigate\nSUPER+SHIFT+H/J/K/L Move Window\nSUPER+1-9          Workspaces\nSUPER+F            Fullscreen\nSUPER+V            Float\nSUPER+N            Notifications\nSUPER+SHIFT+V      Clipboard History\nSUPER+SHIFT+E      Power Menu\nSUPER+SHIFT+D      Display Settings\nSUPER+SHIFT+R      Screen Record\nSUPER+SHIFT+A      Audio Routing\nSUPER+SHIFT+C      Color Picker\nSUPER+F1           Show This Again"
bind = $mainMod, Return, exec, wezterm
bind = $mainMod, Q, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, wofi --show drun
bind = $mainMod, E, exec, dolphin
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod, P, pseudo,
bind = $mainMod, S, togglesplit,
bind = $mainMod, F, fullscreen,

# --- Utilities ---
bind = $mainMod SHIFT, E, exec, wlogout
bind = $mainMod SHIFT, D, exec, wdisplays
bind = $mainMod SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mainMod SHIFT, A, exec, qpwgraph
bind = $mainMod SHIFT, C, exec, hyprpicker -a
bind = $mainMod SHIFT, R, exec, pkill gpu-screen-rec || gpu-screen-recorder -w screen -f 60 -a default_output -o ~/Videos/recording_$(date +%Y%m%d_%H%M%S).mp4

# --- Screenshots ---
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = SHIFT, Print, exec, grim - | swappy -f -

# --- Move focus ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# --- Move windows ---
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# --- Resize ---
bind = $mainMod CTRL, H, resizeactive, -40 0
bind = $mainMod CTRL, L, resizeactive, 40 0
bind = $mainMod CTRL, K, resizeactive, 0 -40
bind = $mainMod CTRL, J, resizeactive, 0 40

# --- Workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- Move to workspace ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- Mouse bindings ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Media keys ---
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl = , XF86AudioMute, exec, pamixer -t
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# --- Window rules ---
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, class:^(.blueman-manager-wrapped)$
windowrule = float, title:^(Picture-in-Picture)$
windowrule = float, class:^(org.kde.dolphin)$, title:^(Progress)$
windowrule = float, class:^(wdisplays)$
windowrule = float, class:^(wlogout)$
windowrule = float, class:^(org.rncbc.qpwgraph)$
windowrule = float, class:^(com.github.wwmm.easyeffects)$
windowrule = float, class:^(nwg-look)$
windowrule = float, class:^(nm-connection-editor)$
