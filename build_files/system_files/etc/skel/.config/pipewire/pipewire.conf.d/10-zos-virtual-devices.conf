# =============================================================================
# zOS Virtual Audio Devices
# VoiceMeeter-style audio routing via PipeWire null sinks
# Use qpwgraph or zos-settings to route apps to these virtual buses
# =============================================================================

context.objects = [
    # --- Virtual Outputs (buses that apps send audio to) ---
    { factory = adapter
      args = {
          factory.name   = support.null-audio-sink
          node.name       = "zos-main"
          node.description = "Main Output"
          media.class     = "Audio/Sink"
          audio.position  = [ FL FR ]
          object.linger   = true
      }
    }
    { factory = adapter
      args = {
          factory.name   = support.null-audio-sink
          node.name       = "zos-music"
          node.description = "Music"
          media.class     = "Audio/Sink"
          audio.position  = [ FL FR ]
          object.linger   = true
      }
    }
    { factory = adapter
      args = {
          factory.name   = support.null-audio-sink
          node.name       = "zos-chat"
          node.description = "Chat / Voice"
          media.class     = "Audio/Sink"
          audio.position  = [ FL FR ]
          object.linger   = true
      }
    }
]
