# =============================================================================
# zOS Hyprland Defaults — SYSTEM MANAGED
# Do not edit. Add overrides to ~/.config/hypr/user-settings.conf
# =============================================================================

# --- Environment ---
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,catppuccin-mocha-dark-cursors
env = HYPRCURSOR_THEME,catppuccin-mocha-dark-cursors
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct

# --- Input ---
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# --- General ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(89b4faee)
    col.inactive_border = rgba(313244aa)
    layout = dwindle
    allow_tearing = false
}

# --- Decoration ---
decoration {
    rounding = 8
    blur {
        enabled = true
        size = 3
        passes = 1
    }
    shadow {
        enabled = false
    }
}

# --- Animations ---
animations {
    enabled = true
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = border, 1, 10, default
    animation = borderangle, 0
    animation = fade, 1, 5, smoothIn
    animation = workspaces, 1, 6, default
}

# --- Layout ---
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    render_unfocused_fps = 60
}

# --- Layer rules ---
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.5, match:namespace waybar

# --- Debug ---
# Aquamarine emits per-input-event DEBUG lines by default. On high-polling
# mice this floods the log and starves the render loop.
debug {
    disable_logs = true
}
