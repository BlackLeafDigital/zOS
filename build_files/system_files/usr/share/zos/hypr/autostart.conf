# =============================================================================
# zOS Autostart — SYSTEM MANAGED
# =============================================================================

exec-once = waybar
exec-once = swaync
exec-once = hyprpaper
exec-once = hypridle
exec-once = hyprpolkitagent
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = notify-send -t 15000 "zOS Keybindings" "SUPER+Return       Terminal\nSUPER+D            App Launcher\nSUPER+E            File Manager\nSUPER+Q            Close Window\nSUPER+H/J/K/L     Navigate\nSUPER+1-9          Workspaces\nSUPER+F            Fullscreen\nSUPER+V            Float\nSUPER+N            Notifications\nSUPER+SHIFT+V      Clipboard History\nSUPER+SHIFT+E      Power Menu\nSUPER+SHIFT+D      Display Settings\nSUPER+SHIFT+A      Audio Routing\nSUPER+SHIFT+C      Color Picker\nSUPER+M            Minimize Window\nSUPER+SHIFT+M      Show Minimized\nSUPER+F1           Show This Again"
exec-once = notify-send -t 12000 "zOS is Immutable" "dnf is disabled at runtime.\n\nInstall software with:\n  flatpak  (GUI apps)\n  brew     (CLI tools)\n  distrobox (full Linux envs)\n\nRun zos-system grub for GRUB/dual-boot config"
