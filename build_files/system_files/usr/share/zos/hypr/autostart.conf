# =============================================================================
# zOS Autostart — SYSTEM MANAGED
# =============================================================================

# --- Deploy missing configs from /etc/skel (runs first, fast) ---
exec-once = zos-skel-sync

# --- System dark mode (GTK, Flatpak, portals) ---
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec-once = gsettings set org.gnome.desktop.interface gtk-theme Adwaita-dark
exec-once = gsettings set org.gnome.desktop.interface icon-theme Papirus-Dark

# --- HyprPanel (replaces waybar, swaync, blueman-applet, nm-applet) ---
exec-once = hyprpanel

# hyprpaper removed — HyprPanel manages wallpapers via swww
exec-once = hypridle
exec-once = hyprpolkitagent
exec-once = hyprshell run &
exec-once = zos-tray
exec-once = zos-dock
exec-once = cursor-clip --daemon
exec-once = wl-clip-persist --clipboard regular
exec-once = netbird-ui
exec-once = xwaylandvideobridge
exec-once = notify-send -t 15000 "zOS Keybindings" "SUPER (tap)        App Launcher\nSUPER+T / Return   Terminal\nSUPER+E            File Manager\nSUPER+Q            Close Window\nSUPER+D            Show Desktop\nSUPER+L            Lock Screen\nSUPER+Arrows       Navigate\nSUPER+1-9          Workspaces\nSUPER+F            Fullscreen\nSUPER+M / Down     Minimize\nSUPER+Up           Maximize\nSUPER+N            Notifications\nSUPER+SHIFT+V      Clipboard History\nSUPER+SHIFT+E      Power Menu\nSUPER+F1           Show This Again"
exec-once = notify-send -t 12000 "zOS is Immutable" "dnf is disabled at runtime.\n\nInstall software with:\n  flatpak  (GUI apps)\n  brew     (CLI tools)\n  distrobox (full Linux envs)\n\nRun zos grub for GRUB/dual-boot config"
