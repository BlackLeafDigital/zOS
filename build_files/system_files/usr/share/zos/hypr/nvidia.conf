# =============================================================================
# NVIDIA Configuration — SYSTEM MANAGED
# Applied on NVIDIA variant only (silently skipped if file missing on AMD)
# =============================================================================

env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = NVD_BACKEND,direct

# NVIDIA 550+: hardware cursors with a GPU-side buffer. The previous combo
# (no_hardware_cursors=false + use_cpu_buffer=true) forced a KMS cursor-buffer
# re-import on every mouse-move event, which pinned Hyprland CPU and stalled
# the event loop on high-polling-rate mice.
cursor {
    no_hardware_cursors = true
    use_cpu_buffer = false
}

# Embedded-browser acceleration on NVIDIA Wayland.
# WebKitGTK's DMABUF renderer misfires on proprietary NVIDIA and silently
# falls back to software rendering. Force the SHM path for now — flip back
# to 0 once explicit-sync is stable across our WebKit/NVIDIA stack.
env = WEBKIT_DISABLE_DMABUF_RENDERER,1

# Electron apps: native Wayland instead of XWayland (lower input latency,
# better HiDPI).
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# QtWebEngine (snapmaker-orca and other Qt apps with embedded browsers):
# enable Ozone Wayland and VA-API video decode.
env = QTWEBENGINE_CHROMIUM_FLAGS,--ozone-platform=wayland --enable-features=UseOzonePlatform,VaapiVideoDecoder
