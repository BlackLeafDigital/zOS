# =============================================================================
# NVIDIA Configuration — SYSTEM MANAGED
# Applied on NVIDIA variant only (silently skipped if file missing on AMD)
# =============================================================================

env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = NVD_BACKEND,direct

# Fix multi-monitor cursor — use hardware cursors with CPU buffer
cursor {
    no_hardware_cursors = false
    use_cpu_buffer = true
}
