# =============================================================================
# NVIDIA Configuration — SYSTEM MANAGED
# Tuned for NVIDIA driver 555+, Hyprland 0.50+.
# =============================================================================

# --- GPU selection ---
# Pin Hyprland to the NVIDIA dGPU, not the AMD iGPU on Ryzen APUs.
# Verify your PCI address with: ls -l /dev/dri/by-path/
env = AQ_DRM_DEVICES,/dev/dri/by-path/pci-0000:01:00.0-card

# --- Core NVIDIA env ---
env = LIBVA_DRIVER_NAME,nvidia
env = NVD_BACKEND,direct
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm

# --- Toolkit renderers ---
# GTK4: use NGL (OpenGL). Vulkan renderer has dGPU enumeration bugs on
# proprietary NVIDIA through 2026 (HyprPanel/GNOME apps glitch/stutter).
env = GSK_RENDERER,ngl

# WebKitGTK: DMABUF path is broken on proprietary NVIDIA; force SHM.
env = WEBKIT_DISABLE_DMABUF_RENDERER,1

# Electron: native Wayland for lower input latency.
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# QtWebEngine: Wayland + VA-API decode.
env = QTWEBENGINE_CHROMIUM_FLAGS,--ozone-platform=wayland --enable-features=UseOzonePlatform,VaapiVideoDecoder

# NOTE: No cursor {} block on purpose. Hyprland defaults
# (no_hardware_cursors=2, use_cpu_buffer=2) are the correct auto behavior
# on NVIDIA 555+. Overriding these with no_hardware_cursors=true forced
# software cursors and tanked UI responsiveness with high-polling mice.
#
# NOTE: explicit_sync is always-on and unconfigurable since Hyprland 0.50.
