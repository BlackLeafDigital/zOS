# =============================================================================
# zOS Window Rules — SYSTEM MANAGED (Hyprland v0.53+ syntax)
# Do not edit. Add extra rules to ~/.config/hypr/user-windowrules.conf
# =============================================================================

windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(.blueman-manager-wrapped)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:class ^(org.kde.dolphin)$ match:title ^(Progress)$, float on
windowrule = match:class ^(wdisplays)$, float on
windowrule = match:class ^(wlogout)$, float on
windowrule = match:class ^(org.rncbc.qpwgraph)$, float on
windowrule = match:class ^(com.github.wwmm.easyeffects)$, float on
windowrule = match:class ^(nwg-look)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
