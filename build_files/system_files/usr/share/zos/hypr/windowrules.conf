# =============================================================================
# zOS Window Rules — SYSTEM MANAGED (Hyprland v0.53+ syntax)
# Do not edit. Add extra rules to ~/.config/hypr/user-windowrules.conf
# =============================================================================

windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(.blueman-manager-wrapped)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:class ^(org.kde.dolphin)$ match:title ^(Progress)$, float on
windowrule = match:class ^(nwg-displays)$, float on
windowrule = match:class ^(wlogout)$, float on
windowrule = match:class ^(org.rncbc.qpwgraph)$, float on
windowrule = match:class ^(com.github.wwmm.easyeffects)$, float on
windowrule = match:class ^(nwg-look)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(com.zos.Settings)$, float on
windowrule = match:class ^(com.zos.Settings)$, size 900 700
windowrule = match:class ^(com.zos.Settings)$, center 1

# --- clipse clipboard TUI ---
windowrule = match:class ^(clipse)$, float on
windowrule = match:class ^(clipse)$, size 622 652
windowrule = match:class ^(clipse)$, center 1

# --- xwaylandvideobridge (screen sharing for X11 apps like Discord) ---
windowrule = match:class ^(xwaylandvideobridge)$, opacity 0.0 override 0.0 override
windowrule = match:class ^(xwaylandvideobridge)$, noanim on
windowrule = match:class ^(xwaylandvideobridge)$, noinitialfocus on
windowrule = match:class ^(xwaylandvideobridge)$, maxsize 1 1
windowrule = match:class ^(xwaylandvideobridge)$, noblur on
