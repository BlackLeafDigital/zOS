# =============================================================================
# zOS Keybindings — SYSTEM MANAGED
# Do not edit. Add extra keybinds to ~/.config/hypr/user-keybinds.conf
# =============================================================================

$mainMod = SUPER

# --- Cheat sheet ---
bind = $mainMod, F1, exec, notify-send -t 10000 "zOS Keybindings" "SUPER+Space        App Launcher\nSUPER+T / Return   Terminal\nSUPER+E            File Manager\nSUPER+Q            Close Window\nSUPER+D            Show Desktop\nSUPER+L            Lock Screen\nSUPER+F            Fullscreen\nSUPER+V            Float Toggle\nSUPER+M / Down     Minimize\nSUPER+Up           Maximize\nSUPER+Arrow Keys   Navigate\nSUPER+SHIFT+Arrows Move Window\nSUPER+ALT+L/R      Move to Monitor\nSUPER+1-9          Workspaces\nSUPER+N            Notifications\nSUPER+SHIFT+V      Clipboard History\nSUPER+SHIFT+E      Power Menu\nSUPER+SHIFT+D      Display Settings\nSUPER+SHIFT+A      Audio Routing\nSUPER+F1           Show This Again"

# --- Core (Windows/macOS-friendly) ---
bind = $mainMod, Space, exec, wofi --show drun
bind = $mainMod, T, exec, wezterm
bind = $mainMod, Return, exec, wezterm
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, dolphin
bind = $mainMod, F, fullscreen,
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, hyprctl dispatch workspaceopt allfloat
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, N, exec, swaync-client -t -sw

# --- Minimize / Maximize ---
bind = $mainMod, M, movetoworkspacesilent, special:minimize
bind = $mainMod, Down, movetoworkspacesilent, special:minimize
bind = $mainMod SHIFT, M, togglespecialworkspace, minimize
bind = $mainMod, Up, fullscreen, 1

# --- Utilities ---
bind = $mainMod SHIFT, E, exec, wlogout
bind = $mainMod SHIFT, D, exec, /usr/share/zos/scripts/save-monitors.sh
bind = $mainMod SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mainMod SHIFT, A, exec, qpwgraph
bind = $mainMod SHIFT, C, exec, hyprpicker -a
bind = $mainMod SHIFT, R, exec, pkill gpu-screen-rec || gpu-screen-recorder -w screen -f 60 -a default_output -o ~/Videos/recording_$(date +%Y%m%d_%H%M%S).mp4

# --- Screenshots ---
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = SHIFT, Print, exec, grim - | swappy -f -

# --- Move focus (arrow keys + vim) ---
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Right, movefocus, r
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u

# --- Move windows (arrow keys + vim) ---
bind = $mainMod SHIFT, Left, movewindow, l
bind = $mainMod SHIFT, Right, movewindow, r
bind = $mainMod SHIFT, Up, movewindow, u
bind = $mainMod SHIFT, Down, movewindow, d
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

# --- Move between monitors ---
bind = $mainMod ALT, Left, movewindow, mon:-1
bind = $mainMod ALT, Right, movewindow, mon:+1

# --- Resize ---
bind = $mainMod CTRL, Left, resizeactive, -40 0
bind = $mainMod CTRL, Right, resizeactive, 40 0
bind = $mainMod CTRL, Up, resizeactive, 0 -40
bind = $mainMod CTRL, Down, resizeactive, 0 40
bind = $mainMod CTRL, H, resizeactive, -40 0
bind = $mainMod CTRL, L, resizeactive, 40 0
bind = $mainMod CTRL, K, resizeactive, 0 -40
bind = $mainMod CTRL, J, resizeactive, 0 40

# --- Layout ---
bind = $mainMod, P, layoutmsg, pseudo
bind = $mainMod, S, layoutmsg, togglesplit

# --- Workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- Move to workspace ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- Mouse bindings ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Media keys ---
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl = , XF86AudioMute, exec, pamixer -t
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
