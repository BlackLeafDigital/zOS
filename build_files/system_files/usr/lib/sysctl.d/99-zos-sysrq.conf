# =============================================================================
# zOS — enable full Magic SysRq for emergency recovery.
# =============================================================================
# When the compositor is wedged and nothing else responds, hold Alt + SysRq
# (same key as PrtScn on most keyboards) and tap the REISUB sequence:
#   R — take keyboard back from the compositor
#   E — SIGTERM all processes
#   I — SIGKILL all processes
#   S — sync filesystems
#   U — remount filesystems read-only
#   B — reboot
# This is a safe forced reboot — no plug-pull, no fsck, no btrfs corruption.
#
# Fedora defaults to 16 (reboot/off only). Value 1 enables all SysRq commands.
kernel.sysrq = 1
